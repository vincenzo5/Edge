services:
  postgres:
    image: postgres:16-alpine
    container_name: tv-ai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tvai
      POSTGRES_PASSWORD: tvai
      POSTGRES_DB: tvai
    volumes:
      - tv_ai_postgres_data:/var/lib/postgresql/data

volumes:
  tv_ai_postgres_data:
