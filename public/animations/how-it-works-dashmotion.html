<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge — How It Works</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0B0E; color: #E8E9ED; font-family: 'Space Grotesk', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #00FF88; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.8); } }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .subtitle { color: #8B8FA3; font-size: 13px; font-weight: 500; margin-bottom: 32px; }
  .card { background: #12131A; border: 1px solid #1E2030; border-radius: 12px; padding: 32px; max-width: 900px; width: 100%; position: relative; }
  .toggle { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 8px; background: #1E2030; border: 1px solid #2A2D3E; color: #8B8FA3; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .toggle:hover { background: #252840; }
  .grid-bg { position: absolute; inset: 0; border-radius: 12px; opacity: 0.15; background-image: repeating-linear-gradient(0deg, #1E2030 0px, #1E2030 0.5px, transparent 0.5px, transparent 40px), repeating-linear-gradient(90deg, #1E2030 0px, #1E2030 0.5px, transparent 0.5px, transparent 40px); pointer-events: none; }
  svg { display: block; margin: 0 auto; }

  @media (prefers-reduced-motion: no-preference) {
    .flow { stroke-dasharray: 5 5; animation: dashmove 0.75s linear infinite; }
    @keyframes dashmove { to { stroke-dashoffset: -10; } }
  }
  @media (prefers-reduced-motion: reduce) {
    .flow { stroke-dasharray: none; animation: none; }
    .dot { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="pulse-dot"></div>
  <h1>How Edge Works</h1>
</div>
<p class="subtitle">Three steps from chart pattern to informed thesis</p>

<div class="card">
  <div class="grid-bg"></div>
  <button class="toggle" onclick="togglePause()" title="Pause/Play">&#9654;</button>

  <svg viewBox="0 0 860 420" width="860" height="420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How Edge works: three-step flow from seeing the setup to getting the full picture" aria-description="Three numbered steps flowing top-down: See the Setup, Ask the Question, Get the Full Picture">

    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#00FF88" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#00FF88" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- START pill -->
    <rect x="346" y="20" width="168" height="36" rx="18" fill="#12131A" stroke="#00FF88" stroke-width="1.5"/>
    <text x="430" y="43" fill="#00FF88" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1" font-family="'Space Grotesk', sans-serif">START</text>

    <!-- START → Step 1 connector -->
    <path d="M430 56 L430 84" class="flow" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.85" marker-end="url(#arrow)"/>

    <!-- Step 1: See the Setup -->
    <rect x="280" y="88" width="300" height="56" rx="10" fill="#0A0B0E"/>
    <rect x="280" y="88" width="300" height="56" rx="10" fill="#12131A" stroke="#1E2030" stroke-width="1"/>
    <!-- Number badge -->
    <circle cx="300" cy="116" r="12" fill="#0A0B0E"/>
    <circle cx="300" cy="116" r="12" fill="rgba(0,255,136,0.15)" stroke="#00FF88" stroke-width="1"/>
    <text x="300" y="121" fill="#00FF88" font-size="11" font-weight="700" text-anchor="middle" font-family="'Space Grotesk', sans-serif">1</text>
    <text x="370" y="114" fill="#E8E9ED" font-size="14" font-weight="700" text-anchor="middle" font-family="'Space Grotesk', sans-serif">See the Setup</text>
    <text x="370" y="130" fill="#8B8FA3" font-size="10" text-anchor="middle" font-family="'Space Grotesk', sans-serif">Your chart, your patterns, your triggers</text>

    <!-- Step 1 → Step 2 connector -->
    <path d="M430 144 L430 172" class="flow" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.85" marker-end="url(#arrow)"/>

    <!-- Step 2: Ask the Question -->
    <rect x="280" y="176" width="300" height="56" rx="10" fill="#0A0B0E"/>
    <rect x="280" y="176" width="300" height="56" rx="10" fill="#12131A" stroke="#1E2030" stroke-width="1"/>
    <circle cx="300" cy="204" r="12" fill="#0A0B0E"/>
    <circle cx="300" cy="204" r="12" fill="rgba(0,255,136,0.15)" stroke="#00FF88" stroke-width="1"/>
    <text x="300" y="209" fill="#00FF88" font-size="11" font-weight="700" text-anchor="middle" font-family="'Space Grotesk', sans-serif">2</text>
    <text x="370" y="202" fill="#E8E9ED" font-size="14" font-weight="700" text-anchor="middle" font-family="'Space Grotesk', sans-serif">Ask the Question</text>
    <text x="370" y="218" fill="#8B8FA3" font-size="10" text-anchor="middle" font-family="'Space Grotesk', sans-serif">AI that knows what you're looking at</text>

    <!-- Step 2 → Step 3 connector -->
    <path d="M430 232 L430 260" class="flow" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.85" marker-end="url(#arrow)"/>

    <!-- Step 3: Get the Full Picture -->
    <rect x="280" y="264" width="300" height="56" rx="10" fill="#0A0B0E"/>
    <rect x="280" y="264" width="300" height="56" rx="10" fill="#12131A" stroke="#00FF88" stroke-width="1.5"/>
    <circle cx="300" cy="292" r="12" fill="#0A0B0E"/>
    <circle cx="300" cy="292" r="12" fill="rgba(0,255,136,0.15)" stroke="#00FF88" stroke-width="1"/>
    <text x="300" y="297" fill="#00FF88" font-size="11" font-weight="700" text-anchor="middle" font-family="'Space Grotesk', sans-serif">3</text>
    <text x="370" y="290" fill="#E8E9ED" font-size="14" font-weight="700" text-anchor="middle" font-family="'Space Grotesk', sans-serif">Get the Full Picture</text>
    <text x="370" y="306" fill="#8B8FA3" font-size="10" text-anchor="middle" font-family="'Space Grotesk', sans-serif">All six layers, synthesized and actionable</text>

    <!-- Step 3 → END connector -->
    <path d="M430 320 L430 346" class="flow" fill="none" stroke="#00FF88" stroke-width="1.5" opacity="0.85" marker-end="url(#arrow)"/>

    <!-- END pill -->
    <rect x="346" y="350" width="168" height="36" rx="18" fill="#12131A" stroke="#00FF88" stroke-width="1.5"/>
    <text x="430" y="373" fill="#00FF88" font-size="12" font-weight="700" text-anchor="middle" letter-spacing="1" font-family="'Space Grotesk', sans-serif">INFORMED</text>

    <!-- Traveling dots -->
    <circle r="4" class="dot" fill="#00FF88" opacity="0.9">
      <animateMotion dur="1.5s" repeatCount="indefinite" path="M430 56 L430 84"/>
    </circle>
    <circle r="4" class="dot" fill="#00FF88" opacity="0.9">
      <animateMotion dur="1.5s" repeatCount="indefinite" path="M430 144 L430 172" begin="0.5s"/>
    </circle>
    <circle r="4" class="dot" fill="#00FF88" opacity="0.9">
      <animateMotion dur="1.5s" repeatCount="indefinite" path="M430 232 L430 260" begin="1s"/>
    </circle>
    <circle r="4" class="dot" fill="#00FF88" opacity="0.9">
      <animateMotion dur="1.5s" repeatCount="indefinite" path="M430 320 L430 346" begin="1.5s"/>
    </circle>

    <!-- Side annotations -->
    <text x="630" y="114" fill="#8B8FA3" font-size="10" font-family="'Space Grotesk', sans-serif">Pattern recognition</text>
    <text x="630" y="202" fill="#8B8FA3" font-size="10" font-family="'Space Grotesk', sans-serif">Contextual AI query</text>
    <text x="630" y="290" fill="#8B8FA3" font-size="10" font-family="'Space Grotesk', sans-serif">Research synthesis</text>

  </svg>
</div>

<script>
  let paused = false;
  const svg = document.querySelector('svg');
  const toggle = document.querySelector('.toggle');

  function togglePause() {
    paused = !paused;
    if (paused) {
      svg.pauseAnimations();
      document.querySelectorAll('.flow').forEach(el => el.style.animationPlayState = 'paused');
      toggle.innerHTML = '&#9654;';
    } else {
      svg.unpauseAnimations();
      document.querySelectorAll('.flow').forEach(el => el.style.animationPlayState = 'running');
      toggle.innerHTML = '&#9646;&#9646;';
    }
  }

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('.dot').forEach(el => el.remove());
    document.querySelectorAll('.flow').forEach(el => {
      el.style.strokeDasharray = 'none';
      el.style.animation = 'none';
    });
  }
</script>

</body>
</html>
