<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Edge Brand Kit</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", system-ui, sans-serif; background: #0A0B0E; color: #E8E9ED; padding: 40px 32px 72px; }
    h1 { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 1.75rem; letter-spacing: -0.03em; margin-bottom: 6px; }
    .sub { color: #8B8FA3; margin-bottom: 28px; }
    .section { margin-bottom: 36px; }
    .section h2 { font-family: "Space Grotesk", system-ui, sans-serif; font-size: 1rem; color: #00FF88; margin-bottom: 14px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
    .card { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .box { border-radius: 12px; border: 1px solid #1E2030; display: flex; align-items: center; justify-content: center; padding: 20px; background: #12131A; }
    .label { font-size: 12px; color: #5A5E73; }
  </style>
</head>
<body>
  <h1>Edge Brand Kit</h1>
  <p class="sub">Final · R2 Mixed Candles · Space Grotesk Bold 700 · no caret</p>

  <div class="section">
    <h2>1. Full logo</h2>
    <div class="row">
      <div class="card"><div class="box" style="background:#0A0B0E"><img src="logo-full-light.svg" width="360" alt="" /></div><div class="label">logo-full-light.svg</div></div>
      <div class="card"><div class="box" style="background:#F4F5F7"><img src="logo-full-dark.svg" width="360" alt="" /></div><div class="label">logo-full-dark.svg</div></div>
      <div class="card"><div class="box" style="background:#0A0B0E"><img src="logo-full-800w.png" width="320" alt="" /></div><div class="label">PNG 800w</div></div>
    </div>
  </div>

  <div class="section">
    <h2>2. Icons / favicon</h2>
    <div class="row">
      <div class="card"><div class="box"><img src="icon-dark.svg" width="72" alt="" /></div><div class="label">icon-dark</div></div>
      <div class="card"><div class="box" style="background:#0A0B0E"><img src="icon-light.svg" width="96" alt="" /></div><div class="label">icon-light</div></div>
      <div class="card"><div class="box"><img src="icon-256.png" width="48" alt="" /></div><div class="label">256</div></div>
      <div class="card"><div class="box"><img src="icon-64.png" width="32" alt="" /></div><div class="label">64</div></div>
      <div class="card"><div class="box"><img src="favicon.ico" width="32" alt="" /></div><div class="label">favicon</div></div>
    </div>
  </div>

  <div class="section">
    <h2>3. Social</h2>
    <div class="row">
      <div class="card"><div class="box" style="padding:8px"><img src="og-image.png" width="420" alt="" /></div><div class="label">OG 1200×630</div></div>
      <div class="card"><div class="box" style="padding:8px"><img src="github-social-preview.png" width="420" alt="" /></div><div class="label">GitHub</div></div>
    </div>
  </div>
</body>
</html>
