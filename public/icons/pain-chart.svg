<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#8B8FA3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pain Point: Chart-Only Limitation  half-visible chart, right side fades -->
  <defs>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="60%" stop-color="#8B8FA3"/>
      <stop offset="100%" stop-color="#8B8FA3" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Chart axes -->
  <line x1="3" y1="20" x2="3" y2="4" stroke="#1E2030" stroke-width="1.5"/>
  <line x1="3" y1="20" x2="21" y2="20" stroke="#1E2030" stroke-width="1.5"/>
  <!-- Left bars (visible) -->
  <rect x="5" y="12" width="3" height="8" rx="0.5" fill="none" stroke="#00FF88" stroke-width="1.5"/>
  <rect x="9.5" y="8" width="3" height="12" rx="0.5" fill="none" stroke="#00FF88" stroke-width="1.5"/>
  <!-- Right bars (fading) -->
  <rect x="14" y="6" width="3" height="14" rx="0.5" fill="none" stroke="url(#fade)" stroke-width="1.5"/>
  <rect x="18.5" y="10" width="2" height="10" rx="0.5" fill="none" stroke="url(#fade)" stroke-width="1.5"/>
</svg>
