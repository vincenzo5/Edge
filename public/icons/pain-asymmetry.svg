<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#8B8FA3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pain Point: Information Asymmetry  one full screen, one empty -->
  <!-- Full monitor (green accent) -->
  <rect x="1" y="3" width="9" height="7" rx="1" stroke="#00FF88" stroke-width="1.5"/>
  <line x1="1" y1="5" x2="10" y2="5" stroke="#00FF88" stroke-width="1.5"/>
  <!-- Data lines inside full monitor -->
  <line x1="3" y1="6.5" x2="8" y2="6.5" stroke="#00FF88" stroke-width="0.75" opacity="0.6"/>
  <line x1="3" y1="8" x2="6" y2="8" stroke="#00FF88" stroke-width="0.75" opacity="0.4"/>
  <line x1="3" y1="9" x2="8.5" y2="9" stroke="#00FF88" stroke-width="0.75" opacity="0.3"/>
  <!-- Stand -->
  <line x1="5" y1="10" x2="5.5" y2="12" stroke="#00FF88" stroke-width="1"/>
  <line x1="3.5" y1="12" x2="7.5" y2="12" stroke="#00FF88" stroke-width="1"/>
  <!-- Empty monitor -->
  <rect x="14" y="3" width="9" height="7" rx="1" stroke="#1E2030" stroke-width="1.5"/>
  <line x1="14" y1="5" x2="23" y2="5" stroke="#1E2030" stroke-width="1.5"/>
  <!-- Stand -->
  <line x1="18" y1="10" x2="18.5" y2="12" stroke="#1E2030" stroke-width="1"/>
  <line x1="16.5" y1="12" x2="20.5" y2="12" stroke="#1E2030" stroke-width="1"/>
  <!-- Empty screen indicator  just a blinking cursor -->
  <line x1="17" y1="7.5" x2="17" y2="9" stroke="#8B8FA3" stroke-width="0.75" opacity="0.3"/>
</svg>
