<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#8B8FA3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Feature: Real-Time Context  radar pulse with concentric rings -->
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.5" fill="#00FF88" stroke="none"/>
  <!-- Concentric pulse rings -->
  <circle cx="12" cy="12" r="4" stroke="#00FF88" stroke-width="1.5" fill="none" opacity="0.8"/>
  <circle cx="12" cy="12" r="7" stroke="#00FF88" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle cx="12" cy="12" r="10" stroke="#00FF88" stroke-width="1" fill="none" opacity="0.25"/>
  <!-- Signal line emanating outward -->
  <line x1="12" y1="2" x2="12" y2="4.5" stroke="#00FF88" stroke-width="1.5" opacity="0.6"/>
</svg>
