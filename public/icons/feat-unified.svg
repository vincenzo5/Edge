<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#8B8FA3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Feature: Unified Workspace  panes merging into one -->
  <!-- Three separate panes on the left -->
  <rect x="1" y="4" width="4" height="4" rx="0.75" stroke="#1E2030" stroke-width="1"/>
  <rect x="1" y="10" width="4" height="4" rx="0.75" stroke="#1E2030" stroke-width="1"/>
  <rect x="1" y="16" width="4" height="4" rx="0.75" stroke="#1E2030" stroke-width="1"/>
  <!-- Arrow pointing right (merge direction) -->
  <path d="M7 12 L9 12" stroke="#00FF88" stroke-width="1.5"/>
  <path d="M8.5 10 L10.5 12 L8.5 14" stroke="#00FF88" stroke-width="1.5" fill="none"/>
  <!-- Merged single pane (green accent) -->
  <rect x="12" y="4" width="10" height="16" rx="1.5" stroke="#00FF88" stroke-width="1.5"/>
  <!-- Content inside merged pane suggesting chart + research + AI -->
  <line x1="14" y1="7" x2="14" y2="18" stroke="#00FF88" stroke-width="0.75" opacity="0.4"/>
  <line x1="18" y1="7" x2="18" y2="18" stroke="#00FF88" stroke-width="0.75" opacity="0.4"/>
  <!-- Three merged sections inside -->
  <rect x="14" y="7" width="3" height="4" rx="0.5" fill="none" stroke="#00FF88" stroke-width="0.75" opacity="0.6"/>
  <rect x="18" y="7" width="2.5" height="4" rx="0.5" fill="none" stroke="#00FF88" stroke-width="0.75" opacity="0.6"/>
  <rect x="14" y="13" width="6.5" height="4" rx="0.5" fill="none" stroke="#00FF88" stroke-width="0.75" opacity="0.6"/>
</svg>
